hardware:
  num_gpus: 8
  per_device_batch_size: 96
  gradient_accumulation_steps: 1
  bf16: true

matryoshka_dims: [32, 64, 128, 256, 512, 768]

teacher:
  model: Qwen/Qwen3-Embedding-4B
  truncate_dims: [32, 64, 128, 256, 512, 768]
  max_seq_length: 512
  prompt_query: query
  prompt_document: null

student:
  model: EuroBERT/EuroBERT-210m
  max_seq_length: 512
  trust_remote_code: true

prefixes:
  query: "Query: "
  document: "Document: "

loss_weights:
  distill_mrl: 0.50
  infonce: 0.25
  cosent: 0.15
  gor: 0.10

batch_routing:
  distill: 0.60
  retrieval: 0.25
  sts: 0.15

training:
  steps: 60000
  lr: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  save_steps: 2000
  logging_steps: 50
  seed: 42

data:
  datasets_dir: data/hf_datasets
  local_files_only: true
  teacher_embeddings_dir: data/teacher_embeddings
  output_dir: output/distilled-eurobert
  pair_datasets:
    - sentence-transformers/gooaq
    - sentence-transformers/natural-questions
    - sentence-transformers/stsb
  triplet_datasets:
    - sentence-transformers/msmarco-hard-negatives
  sts_datasets:
    - sentence-transformers/stsb

eval:
  benchmarks:
    - MTEB(eng, v2)
    - MTEB(Multilingual, v2)
  max_seq_length: 512
  batch_size: 32
